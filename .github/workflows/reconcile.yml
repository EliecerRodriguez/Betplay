name: NBA – Reconciliar Resultados

on:
  # 08:00 UTC = 03:00 hora Colombia (UTC-5).
  # Se ejecuta UNA sola vez al día, a la misma hora que los pipelines NBA y ATP,
  # para que los resultados de ayer queden reconciliados en Supabase al iniciar el día.
  schedule:
    - cron: "0 8 * * *"

  # Ejecución manual (útil para forzar reconciliación de días pasados)
  workflow_dispatch:

jobs:
  reconcile:
    name: Reconcile Results
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run reconcile
        env:
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          NBA_SEASON:    "2025-26"
          MODEL_VERSION: v11
          LOG_LEVEL:     INFO
          PYTHONPATH:    ${{ github.workspace }}
          NBA_API_TIMEOUT: "60"
          NBA_DATA_HEADERS: >-
            {"Host": "stats.nba.com",
             "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
             "Accept": "application/json, text/plain, */*",
             "Accept-Language": "en-US,en;q=0.9",
             "Accept-Encoding": "gzip, deflate, br",
             "x-nba-stats-origin": "stats",
             "x-nba-stats-token": "true",
             "Referer": "https://www.nba.com/",
             "Connection": "keep-alive"}
        run: python reconcile.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reconcile-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
