name: ATP – Pipeline Diario

on:
  # 23:00 UTC = 18:00 hora Colombia (UTC-5)
  # Los partidos ATP empiezan a mediodía local; a las 6 PM ya hay cuotas activas.
  schedule:
    - cron: "0 23 * * *"

  # Ejecución manual desde la pestaña "Actions" → "Run workflow"
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha a procesar (YYYY-MM-DD). Vacío = hoy."
        required: false
        default: ""
      upload_csv:
        description: "¿Subir CSVs de output como artefacto? (true/false)"
        required: false
        default: "false"

jobs:
  atp-pipeline:
    name: ATP Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencias ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Crear directorios necesarios ─────────────────────────────────────
      - name: Create output and logs directories
        run: mkdir -p output logs

      # ── 5. Pipeline ATP ─────────────────────────────────────────────────────
      - name: Run ATP pipeline
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          ATP_MODEL_VERSION: atp_v4
          LOG_LEVEL:         INFO
          PYTHONPATH:        ${{ github.workspace }}
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python run_atp_pipeline.py --date "$DATE_ARG"
          else
            python run_atp_pipeline.py
          fi

      # ── 6. Subir logs (siempre, incluso si falla) ───────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: atp-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14

      # ── 7. Subir CSVs de output (opcional) ─────────────────────────────────
      - name: Upload output CSVs
        if: ${{ github.event.inputs.upload_csv == 'true' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: atp-output-${{ github.run_id }}
          path: output/
          retention-days: 7
