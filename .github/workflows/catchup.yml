name: Catch-up – Reconciliar Resultados Pasados

# PROPÓSITO: Actualizar en Supabase el resultado real (ganó/perdió) de predicciones
# que YA fueron generadas en su día por el pipeline diario pero cuyo resultado
# aún no fue registrado (por ejemplo, porque reconcile.py no corrió esos días).
#
# IMPORTANTE: Este workflow NO genera predicciones retroactivas.
# Las predicciones se generan ANTES del partido (pipeline diario a las 07:00).
# Este workflow solo actualiza la columna home_win en Supabase con el resultado real.

on:
  # Solo manual: úsalo cuando vuelves después de varios días sin entrar
  workflow_dispatch:
    inputs:
      season:
        description: "Temporada NBA (ej. 2025-26)"
        required: false
        default: "2025-26"

jobs:
  catchup-reconcile:
    name: Reconciliar Resultados Pendientes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencias ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Crear directorios necesarios ─────────────────────────────────────
      - name: Create output and logs directories
        run: mkdir -p output logs

      # ── 5. Reconciliar TODOS los resultados pendientes en Supabase ──────────
      # reconcile.py consulta todas las predicciones donde home_win IS NULL,
      # obtiene los resultados reales de la NBA API y actualiza Supabase.
      - name: Run reconcile (all pending results)
        env:
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          NBA_SEASON:    ${{ github.event.inputs.season || '2025-26' }}
          MODEL_VERSION: v11
          LOG_LEVEL:     INFO
          PYTHONPATH:    ${{ github.workspace }}
        run: python reconcile.py

      # ── 6. Subir logs (siempre) ─────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catchup-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      # ── 7. Subir CSVs resultantes ───────────────────────────────────────────
      - name: Upload output CSVs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catchup-output-${{ github.run_id }}
          path: output/
          retention-days: 30
