name: NBA – Pipeline Diario

on:
  # 12:00 UTC = 07:00 ET = 07:00 hora Colombia
  # Los partidos NBA terminan entre 01:00-03:00 UTC; a las 12:00 todos los resultados están disponibles.
  schedule:
    - cron: "0 12 * * *"

  # Ejecución manual desde la pestaña "Actions" → "Run workflow"
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha a procesar (YYYY-MM-DD). Vacío = hoy."
        required: false
        default: ""
      season:
        description: "Temporada NBA (ej. 2025-26)"
        required: false
        default: "2025-26"
      upload_csv:
        description: "¿Subir CSVs de output como artefacto? (true/false)"
        required: false
        default: "false"

jobs:
  pipeline:
    name: NBA Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencias ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Crear directorios necesarios ─────────────────────────────────────
      - name: Create output and logs directories
        run: mkdir -p output/snapshots logs

      # ── 5. Pipeline principal ───────────────────────────────────────────────
      - name: Run NBA pipeline
        env:
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY:  ${{ secrets.ODDS_API_KEY }}
          NBA_SEASON:    ${{ github.event.inputs.season || '2025-26' }}
          MODEL_VERSION: v11
          MODEL_TYPE:    xgboost
          LOG_LEVEL:     INFO
          PYTHONPATH:    ${{ github.workspace }}
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python run_pipeline.py --date "$DATE_ARG"
          else
            python run_pipeline.py
          fi

      # ── 6. Subir logs (siempre, incluso si falla) ───────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: nba-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14

      # ── 7. Subir CSVs de output (opcional) ─────────────────────────────────
      - name: Upload output CSVs
        if: ${{ github.event.inputs.upload_csv == 'true' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: nba-output-${{ github.run_id }}
          path: output/
          retention-days: 7
